<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Poll</title>
    <link rel="stylesheet" href="/app.css" />
    <script type="module" src="/app.mjs" defer></script>
  </head>

  <body>
    <header class="site-header">
      <div class="brand">
        <h1 id="brandTitle">Simple Poll</h1>
      </div>

      <p id="pageHint" class="page-hint">
        Log in or create an account to continue.
      </p>

      <span class="badge">
        <span class="dot"></span>
        local:3000
      </span>

      <nav id="mainNav" class="main-nav hidden" aria-label="Main navigation">
        <button class="nav-btn active" data-view="polls" type="button">
          Polls
        </button>

        <button class="nav-btn" data-view="create" type="button">
          Create poll
        </button>

        <button class="nav-btn" data-view="profile" type="button">
          Profile
        </button>

        <button id="logoutBtn" class="nav-btn danger" type="button">
          Logout
        </button>
      </nav>
    </header>

    <main>
      <!-- AUTH VIEW -->
      <section id="authView" class="auth-view">
        <div class="auth-shell">
          <section class="card auth-card">
            <div class="auth-tabs">
              <button id="showLoginBtn" class="tab-btn active" type="button">
                Login
              </button>

              <button id="showSignupBtn" class="tab-btn" type="button">
                Create account
              </button>
            </div>

            <div id="loginPanel" class="auth-panel">
              <user-edit mode="login"></user-edit>
            </div>

            <div id="signupPanel" class="auth-panel hidden">
              <user-create></user-create>
            </div>
          </section>
        </div>
      </section>

      <!-- APP VIEW -->
      <section id="appView" class="app-view hidden">
        <!-- POLLS -->
        <section id="pollsView" class="view-section">
          <div class="grid">
            <section class="card col-12">
              <h2>Available polls</h2>

              <p class="subtitle">
                Anonymous voting. Users cannot see who voted, only totals and
                percentages.
              </p>

              <div id="pollsList"></div>
            </section>
          </div>
        </section>

        <!-- CREATE POLL -->
        <section id="createPollView" class="view-section hidden">
          <div class="grid">
            <section class="card col-12">
              <h2>Create a poll</h2>

              <p class="subtitle">
                Create a poll that other logged-in users can vote on anonymously.
              </p>

              <form id="createPollForm" class="panel">
                <div class="field">
                  <label for="pollTitle">Title</label>

                  <input
                    id="pollTitle"
                    name="title"
                    type="text"
                    placeholder="What should we vote on?"
                    required
                  />
                </div>

                <div class="options-grid">
                  <div class="field">
                    <label for="option1">Option 1</label>
                    <input id="option1" name="option1" type="text" required />
                  </div>

                  <div class="field">
                    <label for="option2">Option 2</label>
                    <input id="option2" name="option2" type="text" required />
                  </div>

                  <div class="field">
                    <label for="option3">Option 3</label>
                    <input id="option3" name="option3" type="text" />
                  </div>

                  <div class="field">
                    <label for="option4">Option 4</label>
                    <input id="option4" name="option4" type="text" />
                  </div>
                </div>

                <div class="row">
                  <button type="submit">Create poll</button>
                </div>

                <p id="createPollMessage" class="subtitle"></p>
              </form>
            </section>
          </div>
        </section>

        <!-- PROFILE -->
        <section id="profileView" class="view-section hidden">
          <div class="grid">
            <section class="card col-12">
              <h2>Profile</h2>

              <p class="subtitle">
                Update your username or password here.
              </p>

              <user-edit mode="profile"></user-edit>
            </section>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
